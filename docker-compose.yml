version: "3.8"

services:
  xray-manager:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Override Xray version if needed
        # XRAY_VERSION: "v25.4.30"
        TARGETARCH: amd64
    container_name: xray-manager
    restart: unless-stopped

    # ---- Network mode ----
    # "host" is recommended for transparent proxy (iptables/DNS hijack).
    # When using host mode, 'ports:' mapping is ignored — the container
    # directly binds to host interfaces.
    network_mode: host

    # If you prefer bridge mode (no transparent proxy), comment out
    # network_mode above and uncomment ports below:
    # ports:
    #   - "54321:54321"

    volumes:
      # Mount entire xray-manager directory for unified file layout
      # Structure:
      #   config/xray-multi-socks.json  — Xray proxy config
      #   data/geoip.dat, geosite.dat   — GeoIP/GeoSite data
      #   backup/                        — Config backups
      #   state/                         — Runtime state (transparent proxy, balancer, etc.)
      - ./config:/root/xray-manager/config
      - ./data:/root/xray-manager/data
      - ./backup:/root/xray-manager/backup
      - ./state:/root/xray-manager/state

    environment:
      - PYTHONUNBUFFERED=1

    # Capabilities needed for iptables transparent proxy
    cap_add:
      - NET_ADMIN
      - NET_RAW

    # DNS — allow resolution both inside container and via host
    dns:
      - 8.8.8.8
      - 1.1.1.1

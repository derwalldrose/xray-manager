services:
  xray-manager:
    container_name: xray-manager
    image: xray-manager:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./config:/root/xray-manager/config
      - ./data:/root/xray-manager/data
      - ./backup:/root/xray-manager/backup
      - ./state:/root/xray-manager/state
      - ./logs:/root/xray-manager/logs
      - /etc/resolv.conf:/etc/resolv.conf
    environment:
      - PYTHONUNBUFFERED=1
    cap_add:
      - NET_ADMIN
      - NET_RAW
